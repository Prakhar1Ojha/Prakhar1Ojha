name: Auto-Update README

# Regenerates the "Featured Projects" table and the "last synced" timestamp
# in README.md straight from your live GitHub repo data, then commits the
# result back automatically. No manual editing needed for that section.
#
# Runs:
#   - every day at 06:00 UTC (cron)
#   - on every push to main (so it reflects changes within minutes)
#   - manually, anytime, from the Actions tab

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/**'   # avoid re-triggering on workflow-file edits

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate README sections
        run: node scripts/update-readme.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update README [skip ci]"
            git push
          fi
